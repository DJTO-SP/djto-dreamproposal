/* ── 올해의 채택제안 헤더 ── */

}

/* ── 채택제안 카드 (올해) ── */

/* ── 이모지 반응 ── */
.reaction-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.reaction-btn{

<script src="script.js"></script>
<script>
/* ══════════════════════════════════════════════
   올해의 채택제안 + 댓글/이모지 반응 기능
   - 댓글·반응 저장: 기존 Apps Script (별도 시트)
   - APPS_SCRIPT_URL은 기존 script.js 의 변수를 재사용
   ══════════════════════════════════════════════ */

const THIS_YEAR = new Date().getFullYear();
const REACTIONS = ['👍','❤️','🎉','💡','👏'];

// 반응 상태 로컬캐시 (세션 내 중복 클릭 방지)
const _reactedSet = new Set(); // "itemId_emoji"

/* ── Apps Script URL 가져오기 (script.js 변수 공유) ── */
function _getApiUrl() {
  // script.js에서 선언된 전역변수 SCRIPT_URL 또는 GAS_URL 사용
  return (typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL :
          typeof GAS_URL   !== 'undefined' ? GAS_URL   :
          typeof API_URL   !== 'undefined' ? API_URL   : null);
}

/* ── 올해 채택제안 렌더링 진입점 ── */
async function renderThisYear(allData) {
  const yearData = (allData || _allData || []).filter(d => {
    const yr = parseInt(d.period || d['등록연도'] || d['연도'] || 0);
    const award = d.award || d['심사결과'] || '';
    return yr === THIS_YEAR && award !== '' && award !== '심사중' && award !== '미채택';
  });

  document.getElementById('thisYearTitle').textContent = `${THIS_YEAR}년 채택제안 하이라이트`;

  const container = document.getElementById('thisYearCards');
  if (!yearData.length) {
    container.innerHTML = `<div class="no-this-year">🌱 ${THIS_YEAR}년 채택된 제안이 아직 없습니다.<br><span style="font-size:12px">채택제안이 등록되면 여기에 표시됩니다.</span></div>`;
    return;
  }

  // 수상 등급 순서
  const ORDER = {'최우수':0,'우수':1,'장려':2,'특별상':3};
  yearData.sort((a,b) => {
    const aw_a = a.award||a['심사결과']||''; 
    const aw_b = b.award||b['심사결과']||'';
    return (ORDER[aw_a]??9) - (ORDER[aw_b]??9);
  });

  container.innerHTML = '<div class="cmt-loading">💬 댓글 데이터 불러오는 중...</div>';

  // 댓글·반응 일괄 조회
  let commentMap = {}, reactionMap = {};
  try {
    const url = _getApiUrl();
    if (url) {
      const ids = yearData.map(d => d.id || d['ID'] || '').filter(Boolean);
      const res = await fetch(`${url}?action=getComments&ids=${encodeURIComponent(ids.join(','))}`);
      if (res.ok) {
        const json = await res.json();
        commentMap  = json.comments  || {};
        reactionMap = json.reactions || {};
      }
    }
  } catch(e) { /* 조용히 실패 */ }

  container.innerHTML = yearData.map((d, i) => {
    const id      = d.id || d['ID'] || `item_${i}`;
    const title   = d.title   || d['제목'] || '(제목없음)';
    const proposer= d.proposer|| d['제안자'] || '';
    const dept    = d.dept    || d['부서'] || '';
    const award   = d.award   || d['심사결과'] || '';
    const summary = d.summary || d['요약'] || '';
    const comments = commentMap[id]  || [];
    const reactions= reactionMap[id] || {};

    const rankEmoji = {'최우수':'🥇','우수':'🥈','장려':'🥉','특별상':'⭐'}[award] || '🏅';

    const reactionHtml = REACTIONS.map(em => {
      const cnt   = reactions[em] || 0;
      const key   = `${id}_${em}`;
      const acted = _reactedSet.has(key);
      return `<button class="reaction-btn${acted?' reacted':''}" onclick="toggleReaction('${id}','${em}',this)">
        ${em} <span class="reaction-count">${cnt > 0 ? cnt : ''}</span>
      </button>`;
    }).join('');

    const commentHtml = comments.map(c => {
      const initial = (c.name||'익').charAt(0);
      return `<div class="comment-item">
        <div class="comment-avatar">${initial}</div>
        <div class="comment-content">
          <div class="comment-author">${escHtml(c.name||'익명')}</div>
          <div class="comment-text">${escHtml(c.text||'')}</div>
          <div class="comment-time">${c.time||''}</div>
        </div>
      </div>`;
    }).join('');

    return `
    <div class="adopted-card-highlight" id="ach_${id}">
      <div class="ach-top">
        <div class="ach-rank">${rankEmoji}</div>
        <div class="ach-info">
          <div class="ach-title">${escHtml(title)}</div>
          <div class="ach-meta">${escHtml(dept)} · ${escHtml(proposer)} · <span style="color:#2563eb;font-weight:700">${award}</span></div>
        </div>
      </div>
      ${summary ? `<div class="ach-summary">${escHtml(summary)}</div>` : ''}

      <!-- 이모지 반응 -->
      <div class="reaction-bar" id="rxbar_${id}">${reactionHtml}</div>

      <!-- 댓글 -->
      <div class="comment-section">
        <button class="comment-toggle" onclick="toggleComments('${id}')">
          💬 응원 댓글 <span id="cmtcnt_${id}">${comments.length ? comments.length+'개' : '작성하기'}</span>
          <span id="cmtarrow_${id}">▾</span>
        </button>
        <div id="cmtarea_${id}" style="display:none">
          <div class="comment-list" id="cmtlist_${id}">${commentHtml || '<div class="comment-empty">아직 댓글이 없어요. 첫 응원을 남겨보세요! 🌟</div>'}</div>
          <div class="comment-form">
            <div class="comment-inputs-row">
              <input class="comment-name-inp" id="cmtname_${id}" placeholder="이름 (익명 가능)" maxlength="20">
              <textarea class="comment-text-inp" id="cmttxt_${id}" placeholder="응원 한마디를 남겨주세요 😊" maxlength="200" rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitComment('${id}')}"></textarea>
            </div>
            <button class="comment-submit" onclick="submitComment('${id}')">등록 ✈️</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── 댓글 토글 ── */
function toggleComments(id) {
  const area  = document.getElementById(`cmtarea_${id}`);
  const arrow = document.getElementById(`cmtarrow_${id}`);
  if (!area) return;
  const open = area.style.display === 'none';
  area.style.display  = open ? 'block' : 'none';
  arrow.textContent   = open ? '▴' : '▾';
}

/* ── 댓글 제출 ── */
async function submitComment(id) {
  const nameEl = document.getElementById(`cmtname_${id}`);
  const txtEl  = document.getElementById(`cmttxt_${id}`);
  const name = (nameEl.value.trim()) || '익명';
  const text = txtEl.value.trim();
  if (!text) { txtEl.focus(); return; }

  const btn = txtEl.closest('.comment-form').querySelector('.comment-submit');
  btn.disabled = true; btn.textContent = '전송 중…';

  try {
    const url = _getApiUrl();
    if (url) {
      await fetch(`${url}?action=addComment`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id, name, text})
      });
    }
    // 로컬 즉시 반영
    const list = document.getElementById(`cmtlist_${id}`);
    const empty = list.querySelector('.comment-empty');
    if (empty) empty.remove();
    const now = new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    const initial = name.charAt(0);
    const item = document.createElement('div');
    item.className = 'comment-item';
    item.innerHTML = `<div class="comment-avatar">${initial}</div>
      <div class="comment-content">
        <div class="comment-author">${escHtml(name)}</div>
        <div class="comment-text">${escHtml(text)}</div>
        <div class="comment-time">${now}</div>
      </div>`;
    list.appendChild(item);
    // 카운트 업데이트
    const cntEl = document.getElementById(`cmtcnt_${id}`);
    const cur = parseInt(cntEl.textContent) || 0;
    cntEl.textContent = (cur + 1) + '개';
    nameEl.value = ''; txtEl.value = '';
  } catch(e) {
    alert('댓글 저장 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    btn.disabled = false; btn.textContent = '등록 ✈️';
  }
}

/* ── 이모지 반응 토글 ── */
async function toggleReaction(id, emoji, btn) {
  const key = `${id}_${emoji}`;
  const alreadyReacted = _reactedSet.has(key);
  const isAdd = !alreadyReacted;

  // 즉각 UI 반영
  const cntEl = btn.querySelector('.reaction-count');
  const cur = parseInt(cntEl.textContent) || 0;
  if (isAdd) {
    _reactedSet.add(key);
    btn.classList.add('reacted');
    cntEl.textContent = cur + 1;
  } else {
    _reactedSet.delete(key);
    btn.classList.remove('reacted');
    cntEl.textContent = cur > 1 ? cur - 1 : '';
  }

  try {
    const url = _getApiUrl();
    if (url) {
      await fetch(`${url}?action=addReaction`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id, emoji, delta: isAdd ? 1 : -1})
      });
    }
  } catch(e) { /* 서버 실패 시 UI만 유지 */ }
}

/* ── HTML 이스케이프 ── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 채택제안 탭 전환 시 자동 호출 훅 ── */
// script.js의 switchTab이 호출될 때 adopted 탭이면 thisYear 렌더링
(function patchSwitchTab() {
  const _orig = window.switchTab;
  if (typeof _orig !== 'function') {
    // script.js 로드 후 재시도
    window.addEventListener('load', patchSwitchTab);
    return;
  }
  window.switchTab = function(tab, btn) {
    _orig.call(this, tab, btn);
    if (tab === 'adopted') {
      const data = window._allData || window.allData || [];
      renderThisYear(data);
    }
  };
})();
</script>
</html>
