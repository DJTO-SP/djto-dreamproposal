<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
    <script src="https://djto-sp.github.io/djto-innovation/portal-nav.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Exo+2:wght@700;900&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대전관광공사 혁신드림제안제도 통합관리대장</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div style="background:#fff; border-bottom:2px solid #e8edf5; overflow:hidden;">
  <div style="max-width:1160px; margin:0 auto; display:flex; align-items:flex-end; justify-content:space-between; padding:30px 32px 14px 32px;">
    <div onclick="switchTab('list', document.querySelector('.nav-btn'))" style="cursor:pointer;" title="홈으로">
      <div style="font-size:26px; font-weight:900; color:#1a2035; letter-spacing:-1px; line-height:1; font-family:'Noto Sans KR','Malgun Gothic',sans-serif; white-space:nowrap;">대전관광공사 <span style="color:var(--blue);">혁신드림</span>제안제도 통합관리대장</div>
    </div>
    <img src="dream-banner.png" alt="꿈씨패밀리" style="height:80px; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(0,0,0,.1));">
  </div>
</div>
<header style="background:#1e3a6e; height:48px; position:sticky; top:0; z-index:100; box-shadow:0 3px 16px rgba(30,58,110,.35);">
  <div style="max-width:1160px; margin:0 auto; height:100%; display:flex; align-items:center; justify-content:space-between; padding:0 20px;">
    <nav style="display:flex; align-items:center; gap:2px;">
      <button class="nav-btn on" onclick="switchTab('list',this)"><span class="nav-icon">📋</span> 목록</button>
      <button class="nav-btn" onclick="switchTab('year',this)"><span class="nav-icon">📅</span> 연도별</button>
      <button class="nav-btn" onclick="switchTab('cat',this)"><span class="nav-icon">🗂️</span> 분류별</button>
      <button class="nav-btn" onclick="switchTab('adopted',this)"><span class="nav-icon">🏅</span> 채택제안</button>
      <button class="nav-btn" onclick="switchTab('stats',this)"><span class="nav-icon">📊</span> 통계</button>
    </nav>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="color:#a0b4d8;font-size:12px;font-weight:500">전략기획팀 이지민주임&nbsp;📞1148</span>
      <button class="admin-btn" onclick="loadFromSheet()" style="background:#4ecdc4;margin-right:6px">🔄 새로고침</button>
      <button class="admin-btn" id="googleBtn" onclick="googleLogin()" style="background:#fff;color:#444;border-color:#ddd">🔑 Google</button>
      <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔒 관리자</button>
    </div>
  </div>
</header>

<!-- 비밀번호 모달 -->
<div class="modal-overlay" id="pwModal" onclick="if(event.target===this)closePw()">
  <div class="modal">
    <div class="modal-ttl">🔒 관리자 인증</div>
    <div class="modal-sub">관리자 비밀번호를 입력하세요</div>
    <input class="modal-inp" id="pwInput" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="modal-btns">
      <button class="m-cancel" onclick="closePw()">취소</button>
      <button class="m-ok" onclick="doLogin()">확인</button>
    </div>
  </div>
</div>

<!-- 수정 모달 -->
<div class="edit-overlay" id="editOverlay" onclick="if(event.target===this)closeEdit()">
  <div class="edit-modal">
    <div class="edit-modal-hdr">
      <div class="edit-modal-ttl">✏️ 제안 수정</div>
      <button class="edit-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="edit-modal-body">
      <div class="form-grid">
        <div class="form-full">
          <label>제안 제목 <span class="req">*</span></label>
          <input class="fi" id="e_title" type="text">
        </div>
        <div>
          <label>제안자</label>
          <input class="fi" id="e_proposer" type="text">
        </div>
        <div>
          <label>소속 부서</label>
          <select class="fi" id="e_dept" onchange="deptToggle('e_dept','e_dept_etc')">
            <option>안전감사팀</option><option>전략기획팀</option><option>인사노무팀</option>
            <option>총무회계팀</option><option>관광사업팀</option><option>융합사업팀</option>
            <option>홍보마케팅팀</option><option>축제행사팀</option><option>관광개발팀</option>
            <option>시설운영팀</option><option>시민광장팀</option><option>운영지원팀</option>
            <option>센터마케팅팀</option><option>전시기획팀</option><option>MICE뷰로팀</option>
            <option>세계태양광총회TF팀</option><option>기타(직접입력)</option>
          </select>
          <input class="fi" id="e_dept_etc" type="text" placeholder="부서명 직접 입력" style="display:none;margin-top:6px">
        </div>
        <div>
          <label>등록 연도</label>
          <select class="fi" id="e_period">
            <option>2026</option><option>2025</option><option>2024</option>
            <option>2023</option><option>2022</option><option>2021</option>
            <option>2020</option><option>2019</option><option>2018</option><option>2017</option>
          </select>
        </div>
        <div>
          <label>제안 분류</label>
          <select class="fi" id="e_category">
            <option>관광아이디어발굴</option><option>조직혁신</option>
            <option>사회적가치실현</option><option>기타</option>
          </select>
        </div>
        <div>
          <label>심사 결과</label>
          <select class="fi" id="e_award">
            <option>심사중</option><option>최우수</option><option>우수</option>
            <option>장려</option><option>특별상</option><option>미채택</option>
          </select>
        </div>
        <div class="form-full">
          <label>요약 <span class="req">*</span></label>
          <textarea class="fi" id="e_summary" rows="3"></textarea>
        </div>
        <div class="form-full">
          <label>PDF 파일명</label>
          <div class="pdf-input-wrap">
            <input class="fi" id="e_pdf" type="text" placeholder="예: 2017_01_교육기부.png">
            <label for="e_pdf_file" class="pdf-preview-btn" style="cursor:pointer;margin:0">📂 파일 선택</label>
            <input type="file" id="e_pdf_file" accept=".pdf,.png,.jpg,.jpeg" style="display:none" onchange="fillFilename('e_pdf_file','e_pdf')">
            <button class="pdf-preview-btn" onclick="previewPdf('e_pdf')">미리보기</button>
          </div>
          <div class="fi-hint">📁 연도 폴더(2017, 2018...) 안에 있는 파일을 선택하면 경로가 자동 입력됩니다.</div>
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn-delete" onclick="deleteItem()">🗑️ 삭제</button>
        <div class="edit-right">
          <button class="btn-cancel" onclick="closeEdit()">취소</button>
          <button class="btn-submit" onclick="saveEdit()">저장하기</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 일괄변경 바 -->
<div id="bulkBar" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e3a6e;color:#fff;padding:12px 20px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.3);align-items:center;gap:12px;z-index:500;font-size:13px;font-weight:600">
  <span id="bulkCount"></span>
  <span style="color:#a0b4d8">심사결과를</span>
  <select id="bulkSel" style="padding:6px 10px;border-radius:7px;border:none;font-size:13px;font-family:inherit;cursor:pointer" onchange="bulkChangeAward(this.value)">
    <option value="">선택…</option>
    <option>심사중</option><option>최우수</option><option>우수</option>
    <option>장려</option><option>특별상</option><option>미채택</option>
  </select>
  <span style="color:#a0b4d8">으로 일괄 변경</span>
  <button onclick="_checkedIds.clear();document.getElementById('bulkBar').style.display='none';renderTable()" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px">✕ 취소</button>
</div>

<main>
    <!-- 목록 탭 -->
  <div class="tab-content on" id="tab-list">
    <div class="stats" id="statsArea" style="display:none"></div>
    <div class="card" id="listCard">
      <div class="filter-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="srch" type="text" placeholder="제목, 요약 검색…" oninput="renderTable()">
        </div>
        <select id="fCat"    onchange="renderTable()"><option value="">전체 분류</option></select>
        <select id="fAward"  onchange="renderTable()"><option value="">전체 결과</option></select>
        <select id="fPeriod" onchange="renderTable()"><option value="">전체 기간</option></select>
        <span class="count-lbl" id="cntLbl"></span>
      </div>
      <div class="tbl-wrap">
        <table><thead id="tblHead"></thead><tbody id="tblBody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- 상세 (모든 탭에서 공유) -->
  <div class="card" id="detailCard" style="display:none">
    <div class="detail-hdr">
      <button class="back-btn" onclick="closeDetail()">← 목록</button>
      <span style="font-weight:700;font-size:16px">제안 상세</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <div id="detailAward"></div>
        <button id="editBtn" style="display:none;padding:6px 14px;border:none;border-radius:8px;background:var(--amber);color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit" onclick="openEdit(_curId)">✏️ 수정</button>
      </div>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <!-- 연도별 -->
  <div class="tab-content" id="tab-year">
    <div class="sub-nav" id="yearNav"></div>
    <div id="yearArea"></div>
  </div>

  <!-- 분류별 -->
  <div class="tab-content" id="tab-cat">
    <div class="sub-nav" id="catNav"></div>
    <div id="catArea"></div>
  </div>

  <!-- 채택제안 -->
  <div class="tab-content" id="tab-adopted">
    <div id="adoptedHero"></div>
    <div class="sub-nav" id="adoptedNav"></div>
    <div id="adoptedArea"></div>
  </div>

  <!-- 통계 -->
  <div class="tab-content" id="tab-stats">
    <div class="stats-grid">
      <!-- 요약 카드 4개 -->
      <div id="statsCards" class="stats" style="margin-bottom:22px"></div>

      <!-- 연도별 제안 수 -->
      <div class="card" style="padding:24px;margin-bottom:18px">
        <div style="font-weight:800;font-size:15px;color:#1a2035;margin-bottom:18px">📅 연도별 제안 수</div>
        <canvas id="chartYear" height="90"></canvas>
      </div>

      <!-- 심사결과 도넛 + 채택률 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">
        <div class="card" style="padding:24px">
          <div style="font-weight:800;font-size:15px;color:#1a2035;margin-bottom:18px">🏅 심사결과 분포</div>
          <canvas id="chartAward" height="200"></canvas>
        </div>
        <div class="card" style="padding:24px">
          <div style="font-weight:800;font-size:15px;color:#1a2035;margin-bottom:18px">📈 연도별 채택률</div>
          <canvas id="chartRate" height="200"></canvas>
          <div id="adoptRateArea"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="script.js"></script>
</html>
